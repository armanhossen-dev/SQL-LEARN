        <h2 class="p-3 bg-gradient-to-r from-pink-600 to-purple-700 mt-10 text-white text-center font-bold rounded-lg">
    5.🔥 Modern Glass Registration by chatgpt
</h2>

<form action="" method="POST"
      class="max-w-lg mx-auto
      bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl shadow-2xl
      p-8 ring-1 ring-white/10 my-6
      hover:border-cyan-400/40 transition duration-300">

    <!-- First Name -->
    <label class="text-white flex items-center gap-2 mb-1">
        <i class="fa-solid fa-user text-cyan-400"></i> First Name
    </label>
    <input class="w-full bg-white/5 text-white border border-white/20 rounded-lg
                 py-2 px-3 mb-4
                 focus:outline-none focus:ring-2 focus:ring-cyan-400
                 focus:border-cyan-400 transition"
           type="text" name="fname" required>

    <!-- Last Name -->
    <label class="text-white flex items-center gap-2 mb-1">
        <i class="fa-solid fa-user-tag text-purple-400"></i> Last Name
    </label>
    <input class="w-full bg-white/5 text-white border border-white/20 rounded-lg
                 py-2 px-3 mb-4
                 focus:outline-none focus:ring-2 focus:ring-purple-400
                 focus:border-purple-400 transition"
           type="text" name="lname" required>

    <!-- Email -->
    <label class="text-white flex items-center gap-2 mb-1">
        <i class="fa-solid fa-envelope text-pink-400"></i> Email
    </label>
    <input class="w-full bg-white/5 text-white border border-white/20 rounded-lg
                 py-2 px-3 mb-4
                 focus:outline-none focus:ring-2 focus:ring-pink-400
                 focus:border-pink-400 transition"
           type="email" name="email" required>

    <!-- Username -->
    <label class="text-white flex items-center gap-2 mb-1">
        <i class="fa-solid fa-id-badge text-blue-400"></i> Username
    </label>
    <input class="w-full bg-white/5 text-white border border-white/20 rounded-lg
                 py-2 px-3 mb-4
                 focus:outline-none focus:ring-2 focus:ring-blue-400
                 focus:border-blue-400 transition"
           type="text" name="uname" required>

    <!-- Password -->
    <label class="text-white flex items-center gap-2 mb-1">
        <i class="fa-solid fa-lock text-yellow-400"></i> Password
    </label>
    <input class="w-full bg-white/5 text-white border border-white/20 rounded-lg
                 py-2 px-3 mb-5
                 focus:outline-none focus:ring-2 focus:ring-yellow-400
                 focus:border-yellow-400 transition"
           type="password" name="pass" required>

    <!-- Button -->
    <button
        class="w-full py-2 rounded-lg font-semibold text-white
        bg-gradient-to-r from-cyan-500 via-blue-500 to-purple-600
        hover:scale-105 hover:shadow-lg hover:shadow-cyan-500/30
        transition duration-300">
        <i class="fa-solid fa-user-plus mr-2"></i> Register
    </button>

</form>
