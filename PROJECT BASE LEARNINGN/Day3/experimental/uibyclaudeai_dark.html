<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c0e;
      --surface:  #111114;
      --border:   #1e1e24;
      --border-h: #2e2e38;
      --gold:     #c9a96e;
      --gold-dim: rgba(201,169,110,.18);
      --text:     #e8e6e0;
      --muted:    #4a4a58;
      --subtle:   #1a1a20;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'Jost', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(0,0,0,.55) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      animation: rise .9s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section-tag {
      display: inline-flex; align-items: center; gap: .5rem;
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(201,169,110,.5);
      margin-bottom: 1rem;
      padding: .32rem .75rem;
      border: 1px solid rgba(201,169,110,.14);
      border-radius: 2px;
    }

    .eyebrow {
      display: flex; align-items: center; gap: .6rem;
      font-size: .66rem;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
    .eyebrow::before {
      content: '';
      display: block;
      width: 24px; height: 1px;
      background: var(--gold);
      opacity: .5;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.8rem 2.6rem 2.4rem;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.025) inset,
        0 40px 80px rgba(0,0,0,.55),
        0 8px 24px rgba(0,0,0,.35);
      transition: border-color .4s;
      position: relative;
    }
    .card:hover { border-color: var(--border-h); }

    .card::before {
      content: '';
      position: absolute;
      top: -1px; right: 48px;
      width: 56px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: .55;
    }

    .card-head { margin-bottom: 2rem; }

    .card-logo {
      width: 36px; height: 36px;
      border: 1px solid var(--border-h);
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold);
      font-size: .85rem;
      margin-bottom: 1.3rem;
      background: var(--subtle);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      color: var(--text);
      letter-spacing: .01em;
      line-height: 1.1;
    }
    h1 em { font-style: italic; color: var(--gold); }

    .card-sub {
      font-size: .78rem;
      font-weight: 300;
      color: var(--muted);
      margin-top: .45rem;
      letter-spacing: .03em;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .field {
      margin-bottom: 1.1rem;
      opacity: 0;
      animation: fadeUp .5s ease forwards;
    }
    .field:nth-child(1){ animation-delay: .12s }
    .field:nth-child(2){ animation-delay: .18s }
    .field:nth-child(3){ animation-delay: .24s }
    .field:nth-child(4){ animation-delay: .30s }
    .field:nth-child(5){ animation-delay: .36s }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(8px); }
      to   { opacity:1; transform: none; }
    }

    label {
      display: flex; align-items: center; gap: .45rem;
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .48rem;
      transition: color .2s;
    }
    label i { font-size: .66rem; }
    .field:focus-within label { color: var(--gold); }

    .input-wrap { position: relative; }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: .72rem .95rem .72rem 2.45rem;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: .88rem;
      font-weight: 300;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
      -webkit-appearance: none;
    }
    input::placeholder { color: var(--muted); font-size: .8rem; }

    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }
    input:focus + .icon { color: var(--gold); }

    .icon {
      position: absolute;
      left: .88rem; top: 50%; transform: translateY(-50%);
      font-size: .7rem;
      color: var(--muted);
      pointer-events: none;
      transition: color .25s;
    }

    .sep {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.5rem 0 1.4rem;
    }
    .sep::before, .sep::after {
      content: ''; flex: 1;
      height: 1px;
      background: var(--border);
    }
    .sep span {
      font-size: .63rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .btn {
      width: 100%;
      padding: .82rem 1rem;
      background: transparent;
      border: 1px solid var(--gold);
      border-radius: 3px;
      color: var(--gold);
      font-family: 'Jost', sans-serif;
      font-size: .76rem;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: .65rem;
      transition: color .3s, box-shadow .25s, transform .15s;
      opacity: 0;
      animation: fadeUp .5s .44s ease forwards;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform .32s cubic-bezier(.4,0,.2,1);
      z-index: 0;
    }
    .btn:hover::before { transform: translateX(0); }
    .btn:hover { color: #0c0c0e; box-shadow: 0 6px 28px rgba(201,169,110,.18); }
    .btn:active { transform: scale(.985); }
    .btn span, .btn i { position: relative; z-index: 1; }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .75rem;
      color: var(--muted);
      font-weight: 300;
      opacity: 0;
      animation: fadeUp .5s .54s ease forwards;
    }
    .footer a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
    }
    .footer a:hover { opacity: .7; }
  </style>
</head>
<body>

  <div class="wrapper">

    <div class="section-tag">
      <i class="fa-solid fa-fire" style="color:var(--gold)"></i>
      4. Example Combination — Best One
    </div>

    <div class="eyebrow">
      <i class="fa-solid fa-circle-dot" style="font-size:.48rem"></i>
      New Member
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-logo"><i class="fa-solid fa-bolt"></i></div>
        <h1>Create your <em>account.</em></h1>
        <p class="card-sub">Access exclusive features — takes under a minute.</p>
      </div>

      <form action="" method="POST" autocomplete="off">

        <div class="row">
          <div class="field">
            <label for="fname"><i class="fa-solid fa-user"></i> First Name</label>
            <div class="input-wrap">
              <input type="text" id="fname" name="fname" placeholder="Jane" required/>
              <i class="fa-solid fa-user icon"></i>
            </div>
          </div>
          <div class="field">
            <label for="lname"><i class="fa-solid fa-id-card"></i> Last Name</label>
            <div class="input-wrap">
              <input type="text" id="lname" name="lname" placeholder="Doe" required/>
              <i class="fa-solid fa-id-card icon"></i>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="email"><i class="fa-solid fa-envelope"></i> Email Address</label>
          <div class="input-wrap">
            <input type="email" id="email" name="email" placeholder="jane@example.com" required/>
            <i class="fa-solid fa-envelope icon"></i>
          </div>
        </div>

        <div class="field">
          <label for="uname"><i class="fa-solid fa-at"></i> Username</label>
          <div class="input-wrap">
            <input type="text" id="uname" name="uname" placeholder="jane_doe" required/>
            <i class="fa-solid fa-at icon"></i>
          </div>
        </div>

        <div class="field">
          <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
          <div class="input-wrap">
            <input type="password" id="password" name="pass" placeholder="••••••••••" required/>
            <i class="fa-solid fa-lock icon"></i>
          </div>
        </div>

        <div class="sep"><span>continue</span></div>

        <button class="btn" type="submit" name="submit_to_register_btn">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          <span>Register Account</span>
        </button>

      </form>
    </div>

    <p class="footer">Already a member? <a href="#">Sign in</a></p>
  </div>

</body>
</html>
